# One compose file per Spring Boot app. Copy this folder for each new app and
# change ONLY the three marked lines. Alloy discovers it automatically.
#
# Prerequisite (run once on the host):  docker network create observability
services:
  app:
    build: .
    image: springboot-demo:1.0.0
    container_name: springboot-demo                 # (1) unique per app
    ports:
      - "8380:8080"                                  # (2) unique HOST port per app (left side)
    environment:
      - SPRING_APPLICATION_NAME=springboot-demo      # (3) unique per app -> trace service name
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://alloy:4318/v1/traces
      - PAYMENT_SERVICE_URL=http://springboot-demo-2:8080   # App 2, on the shared network
    labels:
      - "metrics.scrape=true"                        # tells Alloy to scrape /actuator/prometheus
    networks:
      - observability
    restart: unless-stopped

networks:
  observability:
    external: true                                   # shared with Alloy + all other apps
