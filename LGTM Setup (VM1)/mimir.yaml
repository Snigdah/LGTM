# Minimal monolithic (single-binary) Mimir config for local/dev use.
multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: warn

blocks_storage:
  backend: filesystem
  bucket_store:
    sync_dir: /data/tsdb-sync
  filesystem:
    dir: /data/blocks
  tsdb:
    dir: /data/tsdb

compactor:
  data_dir: /data/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/rules

store_gateway:
  sharding_ring:
    replication_factor: 1

# Loosen default limits so a single dummy app pushes without 429s.
limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
